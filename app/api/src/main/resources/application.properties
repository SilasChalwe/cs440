spring.application.name=student-loan-system-backend
spring.config.import=optional:file:.env[.properties]
spring.thymeleaf.check-template-location=false
spring.datasource.url=jdbc:sqlite:sqlite_db.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:900000}
app.security.require-ssl=${APP_REQUIRE_SSL:false}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.allowance.monthly-amount=${APP_MONTHLY_ALLOWANCE:1500.00}
app.allowance.monthly-note=${APP_MONTHLY_ALLOWANCE_NOTE:Monthly allowance disbursement}
app.allowance.monthly-cron=${APP_MONTHLY_ALLOWANCE_CRON:0 0 8 1 * *}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
