spring.application.name=student-loan-system-backend
spring.config.import=optional:file:.env[.properties]
spring.thymeleaf.check-template-location=false

# Database configuration
spring.datasource.url=${DB_URL:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update


# Hikari connection pool settings (for Neon)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000

# JPA performance
spring.jpa.open-in-view=false

# JWT & security
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:900000}
app.security.require-ssl=${APP_REQUIRE_SSL:false}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Allowances
app.allowance.monthly-amount=${APP_MONTHLY_ALLOWANCE:1500.00}
app.allowance.monthly-note=${APP_MONTHLY_ALLOWANCE_NOTE:Monthly allowance disbursement}
app.allowance.monthly-cron=${APP_MONTHLY_ALLOWANCE_CRON:0 0 8 1 * *}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
